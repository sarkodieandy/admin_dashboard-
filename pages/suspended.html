<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Status • Finger Licking Admin</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <script src="../env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    .status-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(1200px 700px at 15% 15%, rgba(59,130,246,0.14), transparent 55%),
        radial-gradient(980px 640px at 85% 35%, rgba(249,115,22,0.14), transparent 58%),
        radial-gradient(820px 520px at 50% 90%, rgba(16,185,129,0.10), transparent 62%),
        var(--color-bg);
    }
  </style>
</head>
<body>
  <div class="status-shell">
    <div class="card" style="width: min(680px, 100%); padding: 22px;">
      <div class="flex-between" style="gap: 12px;">
        <div>
          <div class="font-extrabold" style="font-size: 22px; letter-spacing: -0.2px;">Account status</div>
          <div class="muted text-sm" id="subtitle">—</div>
        </div>
        <div class="badge" id="statusBadge">—</div>
      </div>

      <div class="panel-divider" style="margin: 16px 0;"></div>

      <div id="message" class="muted" style="line-height: 1.55;">—</div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top: 18px;">
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
        <button class="btn danger" id="logoutBtnInline" type="button">Logout</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { mountThemeToggle, showToast } from "../js/ui.js";
    import { requireAuth, getClient } from "../js/auth.js";

    mountThemeToggle();
    const session = await requireAuth();
    const supabase = getClient();

    // Platform admins shouldn't land here.
    if (["platform_admin", "super_admin"].includes(session.profile.role)) {
      window.location.href = "dashboard.html";
      await new Promise(() => {});
    }

    const params = new URLSearchParams(window.location.search);
    const status = (params.get("status") || "pending").toLowerCase();
    const name = params.get("name") || "";

    const badge = document.getElementById("statusBadge");
    const subtitle = document.getElementById("subtitle");
    const message = document.getElementById("message");

    subtitle.textContent = name ? `Restaurant: ${name}` : "Your restaurant account needs attention.";

    if (status === "suspended") {
      badge.textContent = "Suspended";
      badge.style.background = "rgba(239,68,68,0.12)";
      message.innerHTML = `
        <div class="font-semibold" style="margin-bottom: 6px;">Your restaurant dashboard is suspended.</div>
        <div class="muted">Please contact support or the platform admin to reactivate your account.</div>
      `;
    } else if (status === "active") {
      badge.textContent = "Active";
      badge.style.background = "rgba(34,197,94,0.12)";
      message.textContent = "Your account is active. If you keep seeing this page, refresh the app.";
    } else {
      badge.textContent = "Pending";
      badge.style.background = "rgba(234,179,8,0.14)";
      message.innerHTML = `
        <div class="font-semibold" style="margin-bottom: 6px;">Your restaurant account is pending approval.</div>
        <div class="muted">You will be able to manage orders and menu once the platform admin approves your restaurant.</div>
      `;
    }

    document.getElementById("refreshBtn").addEventListener("click", () => window.location.reload());
    document.getElementById("logoutBtnInline").addEventListener("click", async () => {
      try { await supabase.auth.signOut(); } catch {}
      showToast("Signed out");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
