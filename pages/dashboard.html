<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard • Finger Licking Admin</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <script src="../env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Finger Licking</div>
      <div class="nav"></div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <div id="pageTitle" class="font-bold">Dashboard</div>
          <div class="muted" style="font-size: var(--text-sm)">Overview</div>
        </div>
        <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
          <select id="branchSwitcherSelect" class="input" style="height:38px; width:200px; padding-right:32px;"></select>
          <button class="btn ghost" title="Search">🔍</button>
          <button class="btn ghost" id="notifBtn" title="Notifications" aria-label="Notifications"></button>
          <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#60a5fa,#2563eb); display:grid; place-items:center; color:white; font-weight:700;">A</div>
        </div>
      </div>
      <div class="page page-enter">
        <div class="kpi-grid" id="kpiGrid">
          <div class="kpi-card">
            <div class="muted text-sm">Today's Orders</div>
            <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
              <div id="kpi-orders" class="text-2xl font-extrabold">—</div>
              <span class="tag success" id="kpi-orders-trend">New</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="muted text-sm">Revenue</div>
            <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
              <div id="kpi-revenue" class="text-2xl font-extrabold">—</div>
              <span class="tag info" id="kpi-revenue-trend">▲</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="muted text-sm">Avg Delivery Time</div>
            <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
              <div id="kpi-time" class="text-2xl font-extrabold">—</div>
              <span class="tag warning">ETA</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="muted text-sm">Active Chats</div>
            <div id="kpi-chats" class="text-2xl font-extrabold" style="margin-top:4px;">—</div>
          </div>
          <div class="kpi-card">
            <div class="muted text-sm">Branch</div>
            <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
              <div id="kpi-branch" class="text-2xl font-extrabold">—</div>
              <span class="tag info" id="kpi-restaurant">—</span>
            </div>
          </div>
        </div>

        <div class="layout-shell" style="margin-top: var(--space-4); gap: var(--space-4); align-items: flex-start;">
          <div class="card" style="flex:1;">
            <div class="flex-between" style="margin-bottom: var(--space-3);">
              <div>
                <div id="activityCardTitle" class="font-bold">Recent Orders</div>
                <div id="activityCardSubtitle" class="muted text-sm">Latest activity</div>
              </div>
              <a id="activityCardAction" class="btn ghost" href="orders.html">View all</a>
            </div>
            <div id="recentOrders" class="space-y-2"></div>
          </div>
          <div class="card" style="width: 420px;">
            <div id="restaurantTotalsTitle" class="font-bold" style="margin-bottom: var(--space-3);">Top Restaurants (7 days)</div>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr><th>Restaurant</th><th id="restaurantTotalsOrdersHead">Orders</th><th id="restaurantTotalsValueHead">Gross</th></tr>
                </thead>
                <tbody id="topRestaurantsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script type="module">
    import { renderSidebar, showToast, mountThemeToggle } from "../js/ui.js";
    import { requireAuth, getClient } from "../js/auth.js";
    import { getCurrentScope, isPlatformRolePublic } from "../js/auth.js";
    import { fetchRecentOrders } from "../js/api.js";
    import { fmtMoney, statusLabel, debug } from "../js/utils.js";
    import { mountNotifications } from "../js/notifications_ui.js";
    import { initBranchState, registerBranchSwitcher, onBranchChange, getSelectedBranchId, getBranchLabel, getBranches } from "../js/branches.js";

    renderSidebar("dashboard.html");
    mountThemeToggle();
    const { profile } = await requireAuth();
    const supabase = getClient();
    const isPlatformSummaryOnly = profile.role === "platform_admin";
    const activityCardTitle = document.getElementById("activityCardTitle");
    const activityCardSubtitle = document.getElementById("activityCardSubtitle");
    const activityCardAction = document.getElementById("activityCardAction");
    const restaurantTotalsTitle = document.getElementById("restaurantTotalsTitle");
    const restaurantTotalsOrdersHead = document.getElementById("restaurantTotalsOrdersHead");
    const restaurantTotalsValueHead = document.getElementById("restaurantTotalsValueHead");
    mountNotifications({ supabase });

    await initBranchState({ role: profile.role, profileBranchId: profile.branch_id, profileRestaurantId: profile.restaurant_id });
    registerBranchSwitcher(document.getElementById("branchSwitcherSelect"), { allowAll: ["super_admin", "platform_admin"].includes(profile.role) });
    onBranchChange(() => {
      loadKpis();
      loadRecent();
      loadTop();
    });

    configureActivityPanel();
    configureRestaurantTotalsPanel();

    loadKpis();
    loadRecent();
    loadTop();

    function configureActivityPanel() {
      if (!activityCardTitle || !activityCardSubtitle || !activityCardAction) return;
      if (isPlatformSummaryOnly) {
        activityCardTitle.textContent = "Today's Restaurant Summary";
        activityCardSubtitle.textContent = "Daily order counts and totals by restaurant";
        activityCardAction.style.display = "none";
        return;
      }
      activityCardTitle.textContent = "Recent Orders";
      activityCardSubtitle.textContent = "Latest activity";
      activityCardAction.style.display = "";
    }

    function configureRestaurantTotalsPanel() {
      if (!restaurantTotalsTitle || !restaurantTotalsOrdersHead || !restaurantTotalsValueHead) return;
      if (isPlatformSummaryOnly) {
        restaurantTotalsTitle.textContent = "Today's Restaurant Totals";
        restaurantTotalsOrdersHead.textContent = "Today";
        restaurantTotalsValueHead.textContent = "Gross";
        return;
      }
      restaurantTotalsTitle.textContent = "Top Restaurants (7 days)";
      restaurantTotalsOrdersHead.textContent = "Orders";
      restaurantTotalsValueHead.textContent = "Gross";
    }

    async function setContextBadges() {
      const branchId = getSelectedBranchId();
      const branchLabel = getBranchLabel(branchId);
      const branchEl = document.getElementById("kpi-branch");
      const restaurantEl = document.getElementById("kpi-restaurant");
      if (branchEl) branchEl.textContent = branchLabel;

      // Prefer branch-linked restaurant name when available (platform view includes relation)
      const branches = getBranches();
      let restaurantName = branches.find((b) => b.id === branchId)?.restaurant?.name;

      if (!restaurantName && profile.restaurant_id) {
        try {
          const { data } = await supabase.from("restaurants").select("name").eq("id", profile.restaurant_id).maybeSingle();
          restaurantName = data?.name;
        } catch (err) {
          debug("restaurant label error", err);
        }
      }

      if (!restaurantName && Array.isArray(branches) && branches.length === 1) {
        restaurantName = branches[0]?.restaurant?.name;
      }

      if (!restaurantName) restaurantName = "All restaurants";
      if (restaurantEl) restaurantEl.textContent = restaurantName;
    }

    async function loadKpis() {
      const rawBranch = getSelectedBranchId();
      const branchId = rawBranch && rawBranch !== "all" ? rawBranch : null;
      const today = new Date(); today.setHours(0,0,0,0);
      let q = supabase.from("orders").select("total,status,branch_id,restaurant_id").gte("created_at", today.toISOString());
      if (!isPlatformRolePublic(profile.role)) q = q.eq("restaurant_id", profile.restaurant_id);
      if (branchId) q = q.eq("branch_id", branchId);
      const { data, error } = await q;
      if (error) debug("kpi orders error", error);
      const orders = data?.length || 0;
      const revenue = data?.reduce((s,o)=>s+Number(o.total||0),0)||0;
      const cancel = data?.filter(o=>o.status==='cancelled').length || 0;
      document.getElementById("kpi-orders").textContent = orders;
      document.getElementById("kpi-revenue").textContent = fmtMoney(revenue);
      document.getElementById("kpi-cancel").textContent = cancel;
      let chatsQ = supabase.from("chats").select("id,branch_id");
      if (branchId) chatsQ = chatsQ.eq("branch_id", branchId);
      const { data: chats, error: chatErr } = await chatsQ;
      if (chatErr) debug("kpi chats error", chatErr);
      document.getElementById("kpi-chats").textContent = chats?.length || 0;
      document.getElementById("kpi-time").textContent = "28 min";
      setContextBadges();
    }

    async function loadRecent() {
      const rawBranch = getSelectedBranchId();
      const list = document.getElementById("recentOrders");
      list.innerHTML = `<div class="skeleton" style="height:40px; border-radius:var(--radius-sm);"></div>`;
      if (isPlatformSummaryOnly) {
        await loadTodayRestaurantSummary({ list, rawBranch });
        return;
      }
      const { data, error } = await fetchRecentOrders({ limit: 12, branchId: rawBranch });
      if (error) { list.innerHTML = `<div class="muted">Error: ${error.message}</div>`; return; }
      if (!data || data.length===0) { list.innerHTML = `<div class="muted">No orders yet.</div>`; return; }
      list.innerHTML = data.map(o=>`
        <div class="flex-between" style="padding:12px; border:1px solid var(--color-border); border-radius: var(--radius-sm); background:var(--color-panel); box-shadow: var(--shadow-xs);">
          <div style="display:flex; gap:12px; align-items:center;">
            <div style="width:34px; height:34px; border-radius:50%; background:#e2e8f0; display:grid; place-items:center; font-weight:800;">${o.id.slice(0,1).toUpperCase()}</div>
            <div>
              <div class="font-semibold">#${o.id.slice(0,8)}</div>
              <div class="muted text-sm">${new Date(o.created_at).toLocaleString()}</div>
            </div>
          </div>
          <div class="chip" style="background:${statusColor(o.status)}; color:#0f172a;">${statusLabel(o.status)}</div>
          <div class="font-bold">${fmtMoney(o.total)}</div>
        </div>`).join("");
    }

    async function loadTodayRestaurantSummary({ list, rawBranch }) {
      const branchId = rawBranch && rawBranch !== "all" ? rawBranch : null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let q = supabase
        .from("orders")
        .select("restaurant_id,total,status,created_at,branch_id")
        .gte("created_at", today.toISOString())
        .order("created_at", { ascending: false })
        .limit(5000);

      if (branchId) q = q.eq("branch_id", branchId);

      const { data, error } = await q;
      if (error) {
        list.innerHTML = `<div class="muted">Error: ${escapeHtml(error.message)}</div>`;
        return;
      }

      const rows = data || [];
      if (!rows.length) {
        list.innerHTML = `<div class="muted">No orders placed today.</div>`;
        return;
      }

      const byRestaurant = new Map();
      for (const row of rows) {
        const restaurantId = row.restaurant_id || "__unknown__";
        const current =
          byRestaurant.get(restaurantId) || {
            orders: 0,
            gross: 0,
            delivered: 0,
            live: 0,
            lastOrderAt: null,
          };
        current.orders += 1;
        current.gross += Number(row.total || 0);
        if (row.status === "delivered") current.delivered += 1;
        if (["placed", "confirmed", "preparing", "ready", "en_route"].includes(String(row.status || ""))) {
          current.live += 1;
        }
        if (!current.lastOrderAt || new Date(row.created_at) > new Date(current.lastOrderAt)) {
          current.lastOrderAt = row.created_at;
        }
        byRestaurant.set(restaurantId, current);
      }

      const restaurantIds = Array.from(byRestaurant.keys()).filter((id) => id !== "__unknown__");
      let nameMap = new Map();
      if (restaurantIds.length) {
        try {
          const { data: restaurants, error: restaurantError } = await supabase
            .from("restaurants")
            .select("id,name")
            .in("id", restaurantIds);
          if (!restaurantError && Array.isArray(restaurants)) {
            nameMap = new Map(restaurants.map((restaurant) => [restaurant.id, restaurant.name || restaurant.id]));
          }
        } catch (err) {
          debug("today summary restaurant names error", err);
        }
      }

      const summaryRows = Array.from(byRestaurant.entries())
        .map(([id, stats]) => ({
          id,
          name: id === "__unknown__" ? "Unknown restaurant" : nameMap.get(id) || "Unknown restaurant",
          ...stats,
        }))
        .sort((a, b) => {
          if (b.orders !== a.orders) return b.orders - a.orders;
          return b.gross - a.gross;
        });

      list.innerHTML = `
        <div style="border:1px solid var(--color-border); border-radius: var(--radius-md); overflow:hidden; background:var(--color-panel);">
          <div style="display:grid; grid-template-columns:minmax(180px,1.6fr) repeat(4,minmax(90px,1fr)); gap:12px; padding:12px 14px; background:var(--color-surface); border-bottom:1px solid var(--color-border); font-size:12px; font-weight:700; color:var(--color-muted); text-transform:uppercase; letter-spacing:0.04em;">
            <div>Restaurant</div>
            <div>Today</div>
            <div>Live</div>
            <div>Delivered</div>
            <div>Gross</div>
          </div>
          ${summaryRows
            .map(
              (row) => `
                <div style="display:grid; grid-template-columns:minmax(180px,1.6fr) repeat(4,minmax(90px,1fr)); gap:12px; padding:14px; border-bottom:1px solid var(--color-border); align-items:center;">
                  <div>
                    <div class="font-semibold">${escapeHtml(row.name)}</div>
                    <div class="muted text-sm">${row.lastOrderAt ? `Last order ${new Date(row.lastOrderAt).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}` : "No recent activity"}</div>
                  </div>
                  <div class="font-semibold">${row.orders}</div>
                  <div><span class="tag info">${row.live}</span></div>
                  <div><span class="tag success">${row.delivered}</span></div>
                  <div class="font-semibold">${fmtMoney(row.gross)}</div>
                </div>
              `
            )
            .join("")}
        </div>
      `;
    }

    function statusColor(s) {
      const map = {
        placed: "#e5edff",
        confirmed: "#dbeafe",
        preparing: "#fef3c7",
        ready: "#dcfce7",
        en_route: "#e0f2fe",
        delivered: "#dcfce7",
        cancelled: "#fee2e2",
      };
      return map[s] || "#e2e8f0";
    }

    async function loadTop() {
      const tbody = document.getElementById("topRestaurantsBody");
      if (!tbody) return;
      tbody.innerHTML = `<tr><td colspan="3"><div class="skeleton" style="height:40px; border-radius:var(--radius-sm);"></div></td></tr>`;

      if (isPlatformSummaryOnly) {
        await loadTodayRestaurantTotals(tbody);
        return;
      }

      const today = new Date();
      const start = new Date();
      start.setDate(today.getDate() - 6);
      const dateFrom = start.toISOString();
      const dateTo = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23, 59, 59, 999).toISOString();

      let q = supabase
        .from("order_financials")
        .select("restaurant_id,gross_total,created_at")
        .gte("created_at", dateFrom)
        .lte("created_at", dateTo)
        .order("created_at", { ascending: false })
        .limit(5000);

      if (!isPlatformRolePublic(profile.role) && profile.restaurant_id) {
        q = q.eq("restaurant_id", profile.restaurant_id);
      }

      const { data, error } = await q;
      if (error) {
        debug("top restaurants error", error);
        tbody.innerHTML = `<tr class="table-empty"><td colspan="3" class="muted">${error.message}</td></tr>`;
        return;
      }

      const byRestaurant = new Map();
      for (const row of data || []) {
        const rid = row.restaurant_id;
        if (!rid) continue;
        const current = byRestaurant.get(rid) || { gross: 0, orders: 0 };
        current.gross += Number(row.gross_total || 0);
        current.orders += 1;
        byRestaurant.set(rid, current);
      }

      const top = Array.from(byRestaurant.entries())
        .map(([id, stats]) => ({ id, ...stats }))
        .sort((a, b) => b.gross - a.gross)
        .slice(0, 5);

      if (!top.length) {
        tbody.innerHTML = `<tr class="table-empty"><td colspan="3" class="muted">No data yet.</td></tr>`;
        return;
      }

      // Resolve names in one batched query.
      const ids = top.map((t) => t.id);
      let nameMap = new Map();
      try {
        const { data: names, error: nameErr } = await supabase.from("restaurants").select("id,name").in("id", ids);
        if (!nameErr && Array.isArray(names)) {
          nameMap = new Map(names.map((r) => [r.id, r.name || r.id]));
        }
      } catch (err) {
        debug("top names error", err);
      }

      tbody.innerHTML = top
        .map((row) => {
          const name = nameMap.get(row.id) || row.id;
          return `
            <tr>
              <td>${escapeHtml(name)}</td>
              <td>${row.orders}</td>
              <td>${fmtMoney(row.gross)}</td>
            </tr>
          `;
        })
        .join("");
    }

    async function loadTodayRestaurantTotals(tbody) {
      const rawBranch = getSelectedBranchId();
      const branchId = rawBranch && rawBranch !== "all" ? rawBranch : null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let q = supabase
        .from("orders")
        .select("restaurant_id,total,created_at,branch_id")
        .gte("created_at", today.toISOString())
        .order("created_at", { ascending: false })
        .limit(5000);

      if (branchId) q = q.eq("branch_id", branchId);

      const { data, error } = await q;
      if (error) {
        debug("today restaurant totals error", error);
        tbody.innerHTML = `<tr class="table-empty"><td colspan="3" class="muted">${escapeHtml(error.message)}</td></tr>`;
        return;
      }

      const byRestaurant = new Map();
      for (const row of data || []) {
        const rid = row.restaurant_id;
        if (!rid) continue;
        const current = byRestaurant.get(rid) || { gross: 0, orders: 0 };
        current.gross += Number(row.total || 0);
        current.orders += 1;
        byRestaurant.set(rid, current);
      }

      const ranked = Array.from(byRestaurant.entries())
        .map(([id, stats]) => ({ id, ...stats }))
        .sort((a, b) => {
          if (b.orders !== a.orders) return b.orders - a.orders;
          return b.gross - a.gross;
        })
        .slice(0, 10);

      if (!ranked.length) {
        tbody.innerHTML = `<tr class="table-empty"><td colspan="3" class="muted">No restaurant orders today.</td></tr>`;
        return;
      }

      let nameMap = new Map();
      try {
        const ids = ranked.map((row) => row.id);
        const { data: restaurants, error: restaurantsError } = await supabase
          .from("restaurants")
          .select("id,name")
          .in("id", ids);
        if (!restaurantsError && Array.isArray(restaurants)) {
          nameMap = new Map(restaurants.map((row) => [row.id, row.name || row.id]));
        }
      } catch (err) {
        debug("today restaurant totals names error", err);
      }

      tbody.innerHTML = ranked
        .map((row) => {
          const name = nameMap.get(row.id) || "Restaurant";
          return `
            <tr>
              <td>${escapeHtml(name)}</td>
              <td>${row.orders}</td>
              <td>${fmtMoney(row.gross)}</td>
            </tr>
          `;
        })
        .join("");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
