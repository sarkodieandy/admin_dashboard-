<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finger Licking – Kitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <div class="shell shell--single">
      <div class="main">
        <header class="topbar">
          <div class="topbar__title">
            <h2>Kitchen Board</h2>
            <p>Oldest orders first — tap to start preparing, then mark as ready.</p>
          </div>
          <div class="topbar__actions">
            <span class="chip" id="sessionChip" hidden></span>
            <button id="soundBtn" class="btn btn--ghost btn--sm" type="button">Sound: On</button>
            <button id="refreshBtn" class="btn btn--ghost btn--sm" type="button">Refresh</button>
            <button id="logoutBtn" class="btn btn--ghost btn--sm" type="button">Logout</button>
          </div>
        </header>

        <main class="content">
          <section class="section-title">
            <h3 id="boardTitle">New & active orders</h3>
            <div class="inline-filters" aria-label="Kitchen filters">
              <button class="pill is-active" type="button" data-filter="active">Active</button>
              <button class="pill" type="button" data-filter="placed">Placed</button>
              <button class="pill" type="button" data-filter="preparing">Preparing</button>
              <button class="pill" type="button" data-filter="ready">Ready</button>
            </div>
          </section>

          <div id="kitchenGrid" class="kitchen-grid"></div>
        </main>
      </div>
    </div>

    <div id="drawerHost" class="drawer-backdrop" aria-hidden="true">
      <aside class="drawer" role="dialog" aria-modal="true" aria-label="Order details">
        <div class="drawer__header">
          <div>
            <h3 id="drawerTitle">Order</h3>
            <p id="drawerSubtitle" class="muted mt-2"></p>
          </div>
          <button id="drawerCloseBtn" class="btn btn--ghost btn--sm" type="button" title="Close">
            Close <span class="kbd">Esc</span>
          </button>
        </div>
        <div id="drawerContent" class="drawer__content"></div>
        <div id="drawerFooter" class="drawer__footer"></div>
      </aside>
    </div>

    <div id="toastHost" class="toast-host" aria-live="polite" aria-relevant="additions"></div>

    <script type="module" src="js/chef/chefDashboard.js"></script>
  </body>
</html>
