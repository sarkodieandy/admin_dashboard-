<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard • Finger Licking Admin</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <script src="../env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Finger Licking</div>
      <div class="nav"></div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <div id="pageTitle" class="font-bold">Dashboard</div>
          <div class="muted" style="font-size: var(--text-sm)">Overview</div>
        </div>
        <div style="margin-left:auto;"></div>
      </div>
      <div class="page">
        <div class="kpi-grid" id="kpiGrid">
          <div class="kpi-card"><div class="muted text-sm">Today Orders</div><div id="kpi-orders" class="text-2xl font-extrabold">—</div></div>
          <div class="kpi-card"><div class="muted text-sm">Revenue</div><div id="kpi-revenue" class="text-2xl font-extrabold">—</div></div>
          <div class="kpi-card"><div class="muted text-sm">Cancellations</div><div id="kpi-cancel" class="text-2xl font-extrabold">—</div></div>
          <div class="kpi-card"><div class="muted text-sm">Active Chats</div><div id="kpi-chats" class="text-2xl font-extrabold">—</div></div>
        </div>

        <div class="layout-shell" style="margin-top: var(--space-4); gap: var(--space-4); align-items: flex-start;">
          <div class="card" style="flex:1;">
            <div class="flex-between" style="margin-bottom: var(--space-3);">
              <div>
                <div class="font-bold">Recent Orders</div>
                <div class="muted text-sm">Latest activity</div>
              </div>
              <a class="btn ghost" href="orders.html">View all</a>
            </div>
            <div id="recentOrders" class="space-y-2"></div>
          </div>
          <div class="card" style="width: 420px;">
            <div class="font-bold" style="margin-bottom: var(--space-3);">Orders by Hour (today)</div>
            <canvas id="ordersChart" height="200"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script type="module">
    import { renderSidebar, showToast } from "../js/ui.js";
    import { requireAuth } from "../js/auth.js";
    import { fetchRecentOrders } from "../js/api.js";
    import { statusLabel } from "../js/utils.js";
    import { createClient } from "../js/supabaseClient.js";

    renderSidebar("dashboard.html");
    const supabase = createClient();

    await requireAuth();
    loadKpis();
    loadRecent();
    drawChart();

    async function loadKpis() {
      const today = new Date(); today.setHours(0,0,0,0);
      const { data } = await supabase.from("orders").select("total,status").gte("created_at", today.toISOString());
      const orders = data?.length || 0;
      const revenue = data?.reduce((s,o)=>s+Number(o.total||0),0)||0;
      const cancel = data?.filter(o=>o.status==='cancelled').length || 0;
      document.getElementById("kpi-orders").textContent = orders;
      document.getElementById("kpi-revenue").textContent = `GH₵ ${revenue.toFixed(2)}`;
      document.getElementById("kpi-cancel").textContent = cancel;
      const { data: openChats } = await supabase.from("conversations").select("id").is("closed_at", null);
      document.getElementById("kpi-chats").textContent = openChats?.length || 0;
    }

    async function loadRecent() {
      const list = document.getElementById("recentOrders");
      list.innerHTML = `<div class="skeleton" style="height:40px; border-radius:var(--radius-sm);"></div>`;
      const { data, error } = await fetchRecentOrders();
      if (error) { list.innerHTML = `<div class="muted">Error: ${error.message}</div>`; return; }
      if (!data || data.length===0) { list.innerHTML = `<div class="muted">No orders yet.</div>`; return; }
      list.innerHTML = data.map(o=>`
        <div class="flex-between" style="padding:10px 12px; border:1px solid var(--color-border); border-radius: var(--radius-sm);">
          <div>
            <div class="font-semibold">#${o.id.slice(0,8)}</div>
            <div class="muted text-sm">${new Date(o.created_at).toLocaleString()}</div>
          </div>
          <div class="chip">${statusLabel(o.status)}</div>
          <div class="font-bold">GH₵ ${Number(o.total||0).toFixed(2)}</div>
        </div>`).join("");
    }

    async function drawChart() {
      const today = new Date(); today.setHours(0,0,0,0);
      const { data } = await supabase.from("orders").select("created_at").gte("created_at", today.toISOString());
      const buckets = Array.from({length:24},(_,h)=>({h, c:0}));
      (data||[]).forEach(o=>{
        const hour = new Date(o.created_at).getHours();
        buckets[hour].c++;
      });
      const ctx = document.getElementById("ordersChart");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: buckets.map(b=>b.h),
          datasets: [{ label:"Orders", data: buckets.map(b=>b.c), backgroundColor:"#22c55e" }]
        },
        options: { plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true} } }
      });
    }
  </script>
</body>
</html>
