<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finger Licking Admin</title>
  <!-- Tailwind Play CDN for fast setup -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfdf3',
              100: '#d1fadf',
              200: '#a7f3c7',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            },
            surface: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              700: '#0f172a',
              800: '#0b1222',
              900: '#090f1d',
            },
          },
          boxShadow: {
            card: '0 10px 30px rgba(0,0,0,0.08)',
          },
          borderRadius: {
            xl: '18px',
          },
        },
      },
      darkMode: 'class',
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif; }
    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); }
    .card { @apply bg-white/90 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-xl shadow-card; }
    .badge { @apply px-2 py-1 text-xs font-semibold rounded-full; }
  </style>
</head>
<body class="bg-surface-50 dark:bg-surface-900 text-surface-900 dark:text-slate-100">
  <div id="app" class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="hidden md:flex flex-col w-64 bg-white/90 dark:bg-surface-800 border-r border-surface-200 dark:border-white/10 px-4 py-6 gap-4">
      <div class="flex items-center gap-3 px-2">
        <div class="h-10 w-10 rounded-xl bg-brand-500 text-white grid place-items-center font-extrabold">FL</div>
        <div>
          <div class="text-lg font-extrabold leading-tight">Finger Licking</div>
          <div class="text-xs text-slate-500 dark:text-slate-300">Admin Dashboard</div>
        </div>
      </div>
      <nav id="nav" class="flex-1 space-y-1 text-sm font-semibold">
        <!-- nav items injected -->
      </nav>
      <div class="mt-auto space-y-2">
        <div class="text-xs text-slate-500 dark:text-slate-300 px-2">Signed in as</div>
        <div class="px-2 py-3 rounded-xl bg-slate-100/80 dark:bg-white/5 border border-surface-200 dark:border-white/10">
          <div id="meName" class="font-semibold truncate">—</div>
          <div id="meRole" class="text-xs text-slate-500 dark:text-slate-300">—</div>
        </div>
        <button id="signOutBtn" class="w-full py-2 rounded-xl bg-slate-900 text-white hover:bg-slate-800 transition">Sign out</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col">
      <!-- Topbar -->
      <header class="sticky top-0 z-20 bg-white/90 dark:bg-surface-800 border-b border-surface-200 dark:border-white/10 backdrop-blur px-4 md:px-6 py-3 flex items-center gap-3">
        <button id="mobileMenuBtn" class="md:hidden h-10 w-10 rounded-lg border border-surface-200 dark:border-white/10 grid place-items-center">
          <span class="material-icons">menu</span>
        </button>
        <div class="flex-1">
          <div id="pageTitle" class="text-lg font-extrabold">Dashboard</div>
          <div id="pageSub" class="text-xs text-slate-500 dark:text-slate-300">Overview</div>
        </div>
        <div class="flex items-center gap-2">
          <input id="globalSearch" class="hidden sm:block h-10 w-64 px-3 rounded-lg border border-surface-200 dark:border-white/10 bg-white/70 dark:bg-white/5" placeholder="Search orders, customers..." />
          <button id="notifBtn" class="h-10 w-10 rounded-lg border border-surface-200 dark:border-white/10 grid place-items-center">🔔</button>
          <div class="h-10 w-10 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 text-white grid place-items-center font-semibold">AD</div>
        </div>
      </header>

      <!-- Content -->
      <section id="content" class="p-4 md:p-6 space-y-4">
        <!-- Dynamic views get injected here -->
      </section>
    </main>
  </div>

  <!-- Login overlay -->
  <div id="loginOverlay" class="fixed inset-0 bg-slate-900/70 backdrop-blur z-50 grid place-items-center">
    <div class="w-full max-w-md card p-6 space-y-4">
      <div>
        <div class="text-xl font-extrabold">Sign in</div>
        <div class="text-sm text-slate-500">Staff/Admin accounts only.</div>
      </div>
      <form id="loginForm" class="space-y-3">
        <label class="space-y-1 block">
          <div class="text-sm font-semibold">Email</div>
          <input name="email" type="email" required class="w-full h-11 px-3 rounded-lg border border-surface-200" placeholder="admin@example.com" />
        </label>
        <label class="space-y-1 block">
          <div class="text-sm font-semibold">Password</div>
          <input name="password" type="password" required class="w-full h-11 px-3 rounded-lg border border-surface-200" placeholder="••••••••" />
        </label>
        <button id="loginBtn" type="submit" class="w-full h-11 rounded-lg bg-brand-600 text-white font-semibold hover:bg-brand-700 transition">Sign in</button>
        <p class="text-xs text-slate-500">Make sure the user is in <code>staff_allowlist</code> and <code>profiles.role</code> is <code>admin</code> or <code>staff</code>.</p>
      </form>
    </div>
  </div>

  <div id="toast" class="fixed right-4 bottom-4 z-50 hidden min-w-[260px] max-w-sm rounded-xl bg-slate-900 text-white px-4 py-3 shadow-lg"></div>

  <!-- Debug panel -->
  <div id="debugPanel" class="fixed right-4 bottom-20 w-96 max-h-64 overflow-auto bg-white/90 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-xl p-3 hidden text-xs space-y-1"></div>

  <script src="./env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
